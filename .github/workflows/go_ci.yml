name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    # --- Root Folder Execution ---
    - name: Root - Go Vet
      run: go vet .

    - name: Root and subfolders - Go Fmt Check
      run: |
        # If gofmt outputs anything, grep will find it and exit with 0, 
        # so we invert it with '!' to make the workflow fail.
        ! gofmt -l . | grep -q .

    - name: Root - Go Build
      run: go build .

    # --- Subfolder Execution ---
    - name: Telegram Channel - Go Vet
      run: go vet .
      working-directory: ./channels/telegram

    - name: Telegram Channel - Go Build
      run: go build .
      working-directory: ./channels/telegram