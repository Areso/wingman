name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    # --- Root Folder Execution ---
    - name: Root - Go Vet
      run: go vet .

    - name: Root - Go Build
      run: go build .

    # --- Subfolder Execution ---
    - name: Telegram Channel - Go Vet
      run: go vet .
      working-directory: ./channels/telegram

    - name: Telegram Channel - Go Build
      run: go build .
      working-directory: ./channels/telegram